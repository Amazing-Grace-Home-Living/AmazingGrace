<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Syndicate Siege — tower defense minigame in the Rebellion OS arcade." />
  <meta name="theme-color" content="#020205" />
  <link rel="icon" type="image/png" href="../../assets/logo.png" />
  <title>Syndicate Siege | Amazing Grace Arcade</title>
  <link rel="stylesheet" href="../../assets/css/unified-nav.css" />
  <link rel="stylesheet" href="../../assets/css/rebellion-skin.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      gap: 0.75rem;
    }

    h1 {
      margin: 0.25rem 0 0;
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      letter-spacing: 0.15em;
      color: var(--accent-crimson);
      text-shadow: 0 0 18px rgba(255,75,139,0.5);
    }

    /* ── HUD ── */
    #hud {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.85rem;
    }

    #hud span {
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-subtle);
      white-space: nowrap;
    }

    /* ── Grid ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(8, 44px);
      grid-template-rows: repeat(6, 44px);
      gap: 3px;
      background: #0b0d16;
      padding: 8px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .cell {
      width: 44px;
      height: 44px;
      border-radius: 6px;
      background: rgba(255,255,255,0.03);
      position: relative;
      cursor: pointer;
      transition: background 0.15s;
    }

    .cell.path { background: rgba(53,224,255,0.08); }
    .cell.selected-for-placement { outline: 2px dashed var(--accent-cyan); }

    .cell.tower-1 {
      background: rgba(189,0,255,0.4);
      box-shadow: 0 0 8px rgba(189,0,255,0.7);
    }

    .cell.tower-2 {
      background: rgba(255,216,107,0.45);
      box-shadow: 0 0 12px rgba(255,216,107,0.8);
    }

    /* Cosmetic tower skins */
    .cell.skin-quantum.tower-1  { background: rgba(0,229,255,0.3); box-shadow: 0 0 12px #00e5ff; }
    .cell.skin-spectral.tower-1 { background: rgba(189,0,255,0.3); box-shadow: 0 0 12px #bd00ff; }
    .cell.skin-ultra.tower-1    { background: rgba(255,75,139,0.4); box-shadow: 0 0 12px #ff4b8b; }

    .enemy {
      width: 70%;
      height: 70%;
      border-radius: 50%;
      background: #ff3366;
      position: absolute;
      top: 15%;
      left: 15%;
      transition: background 0.2s;
    }

    .enemy.elite { background: #ff9900; box-shadow: 0 0 8px rgba(255,153,0,0.8); }
    .enemy.boss  { background: #bd00ff; width: 90%; height: 90%; top: 5%; left: 5%; box-shadow: 0 0 14px rgba(189,0,255,0.9); }

    /* ── Controls ── */
    #controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.25rem;
    }

    .ctrl-btn {
      padding: 0.45rem 0.9rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: var(--text-main);
      cursor: pointer;
      font-size: 0.82rem;
      font-family: inherit;
      transition: background 0.15s, border-color 0.15s;
    }

    .ctrl-btn:hover { background: rgba(255,255,255,0.08); border-color: var(--accent-cyan); }
    .ctrl-btn.active { background: rgba(53,224,255,0.12); border-color: var(--accent-cyan); color: var(--accent-cyan); }
    .ctrl-btn.danger { border-color: var(--accent-crimson); color: var(--accent-crimson); }
    .ctrl-btn.elite-on { background: rgba(255,75,139,0.15); border-color: var(--accent-crimson); color: var(--accent-crimson); }

    /* ── Info panel ── */
    #info-panel {
      max-width: 400px;
      width: 100%;
      background: var(--bg-panel);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.82rem;
      color: var(--text-muted);
      min-height: 3rem;
    }

    #info-panel strong { color: var(--accent-gold); }

    /* ── Tower upgrade panel ── */
    #upgrade-panel {
      display: none;
      max-width: 400px;
      width: 100%;
      background: var(--bg-panel);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.82rem;
    }

    #upgrade-panel h3 { margin: 0 0 0.5rem; font-size: 0.9rem; color: var(--accent-gold); }

    /* ── Log ── */
    #log {
      max-width: 400px;
      width: 100%;
      max-height: 80px;
      overflow-y: auto;
      font-size: 0.75rem;
      color: var(--text-muted);
      padding: 0 0.25rem;
    }

    #log p { margin: 0.1rem 0; }
    #log p.warn { color: var(--accent-crimson); }
    #log p.good { color: var(--accent-cyan); }
    #log p.elite { color: var(--accent-gold); }
  </style>
</head>
<body>

  <header>
    <a href="../../" class="logo" aria-label="Amazing Grace Home Living — Home">
      <img src="../../assets/logo.png" alt="Amazing Grace" width="36" height="36" />
      Amazing Grace
    </a>
    <nav id="main-nav" class="nav-links">
      <a href="../../">Home</a>
      <a href="../../arcade/" class="active" aria-current="page">Arcade</a>
      <a href="../../stories/">Stories</a>
      <a href="../../library/">Library</a>
    </nav>
  </header>

  <main style="display:contents;">

    <h1>⚔ SYNDICATE SIEGE</h1>

    <div id="hud">
      <span>💰 <span id="rebel-credits">500</span> cr</span>
      <span>⭐ XP <span id="rebel-xp">0</span></span>
      <span>🌡 Threat <span id="rebel-threat">0</span>%</span>
      <span>🌊 Wave <span id="wave-display">0</span></span>
      <span>🏯 Base <span id="base-hp">10</span></span>
    </div>

    <div id="grid"></div>

    <div id="controls">
      <button class="ctrl-btn" id="btn-start-wave">▶ Start Wave</button>
      <button class="ctrl-btn" id="btn-buy-tower">🗼 Buy Tower (150 cr)</button>
      <button class="ctrl-btn" id="btn-upgrade-mode">⬆ Upgrade Tower</button>
      <button class="ctrl-btn" id="btn-elite-toggle">Elite Mode: OFF</button>
      <a href="../" class="ctrl-btn">← Arcade</a>
    </div>

    <div id="upgrade-panel">
      <h3>⬆ Upgrade Selected Tower</h3>
      <p id="upgrade-desc">Click a tower cell to select it, then upgrade here.</p>
      <button class="ctrl-btn" id="upgrade-tower" disabled>Upgrade (1 Ultra Shard)</button>
      <button class="ctrl-btn" id="btn-close-upgrade" style="margin-left:0.5rem;">Close</button>
    </div>

    <div id="info-panel">Select a tower cell to see details, or start a wave.</div>

    <div id="log"></div>

  </main>

  <script src="../js/rebellion-core.js"></script>
  <script src="../js/cosmetics.js"></script>
  <script>
    /* ════════════════════════════════════════════
       INIT
    ════════════════════════════════════════════ */
    loadRebellionState();
    applyUITheme();
    updateHUD();

    /* ════════════════════════════════════════════
       CONSTANTS
    ════════════════════════════════════════════ */
    const ROWS = 6;
    const COLS = 8;

    /* Fixed path coordinates the enemies follow */
    const PATH = [
      [0,0],[0,1],[0,2],[1,2],[2,2],[3,2],[3,3],[3,4],
      [2,4],[1,4],[1,5],[1,6],[2,6],[3,6],[4,6],[5,6],[5,7]
    ];
    const PATH_SET = new Set(PATH.map(([r,c]) => `${r}-${c}`));

    /* ════════════════════════════════════════════
       STATE
    ════════════════════════════════════════════ */
    let cells = [];
    let towers = [];       // { row, col, level, damage, range, cooldown, cellEl }
    let enemies = [];      // { pathIndex, hp, maxHp, alive, delay, type }
    let wave = 0;
    let baseHP = 10;
    let loopId = null;
    let placingTower = false;
    let upgradingMode = false;
    let selectedTower = null;
    let overloadTriggered = false;
    let eliteMode = false;

    /* ════════════════════════════════════════════
       BUILD GRID
    ════════════════════════════════════════════ */
    function buildGrid() {
      const gridEl = document.getElementById("grid");
      gridEl.innerHTML = "";
      cells = [];

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = document.createElement("div");
          cell.className = "cell" + (PATH_SET.has(`${r}-${c}`) ? " path" : "");
          cell.dataset.row = r;
          cell.dataset.col = c;
          cell.addEventListener("click", () => onCellClick(r, c, cell));
          gridEl.appendChild(cell);
          cells.push(cell);
        }
      }
    }

    function getCell(r, c) {
      return cells.find(x => +x.dataset.row === r && +x.dataset.col === c);
    }

    /* ════════════════════════════════════════════
       CELL INTERACTIONS
    ════════════════════════════════════════════ */
    function onCellClick(r, c, cell) {
      /* ── Upgrade mode: select a tower ── */
      if (upgradingMode) {
        const tower = towers.find(t => t.row === r && t.col === c);
        if (!tower) {
          setInfo("No tower here. Click a purple/gold tower cell.");
          return;
        }
        selectedTower = tower;
        const upgradeBtn = document.getElementById("upgrade-tower");
        upgradeBtn.disabled = false;
        const shards = rebellionState.inventory.ultraShard || 0;
        document.getElementById("upgrade-desc").textContent =
          `Tower Lv ${tower.level} — DMG ${tower.damage} | Range ${tower.range} | CD ${tower.cooldown} | You have ${shards} Ultra Shard(s).`;
        return;
      }

      /* ── Place tower ── */
      if (placingTower) {
        if (cell.classList.contains("path") || cell.classList.contains("tower-1") || cell.classList.contains("tower-2")) {
          setInfo("Can't place there — path or occupied.");
          return;
        }
        if (!spendCredits(150)) {
          setInfo("⚠ Not enough credits (need 150).");
          placingTower = false;
          document.getElementById("btn-buy-tower").classList.remove("active");
          return;
        }
        const tower = { row: r, col: c, level: 1, damage: 2, range: 2, cooldown: 0, cellEl: cell };
        towers.push(tower);
        applyTowerSkin(cell, 1);
        setInfo(`Tower placed at (${r},${c}). Costs 150 cr.`);
        placingTower = false;
        document.getElementById("btn-buy-tower").classList.remove("active");
        logMsg(`🗼 Tower placed at (${r},${c})`, "good");
        return;
      }

      /* ── Default: show tower info ── */
      const tower = towers.find(t => t.row === r && t.col === c);
      if (tower) {
        setInfo(`<strong>Tower Lv ${tower.level}</strong> — DMG ${tower.damage} | Range ${tower.range} | CD base ${tower.cooldown}`);
      }
    }

    function applyTowerSkin(cell, level) {
      cell.classList.remove("tower-1","tower-2","skin-quantum","skin-spectral","skin-ultra");
      cell.classList.add(level === 2 ? "tower-2" : "tower-1");
      const skin = rebellionState.cosmetics.equipped.towerSkin;
      if (skin === "tower_quantum")  cell.classList.add("skin-quantum");
      if (skin === "tower_spectral") cell.classList.add("skin-spectral");
      if (skin === "tower_ultra")    cell.classList.add("skin-ultra");
    }

    /* ════════════════════════════════════════════
       WAVE SYSTEM
    ════════════════════════════════════════════ */
    function spawnNormalWave() {
      wave++;
      document.getElementById("wave-display").textContent = wave;
      enemies = [];
      const tier = getThreatTier();
      const count = 3 + wave + (tier >= 3 ? 2 : 0);

      for (let i = 0; i < count; i++) {
        const hp = Math.floor(2 + wave * 0.5);
        enemies.push({ pathIndex: 0, hp, maxHp: hp, alive: true, delay: i * 10, type: "normal", speed: 1 });
      }

      if (!loopId) loopId = setInterval(gameLoop, 200);
      logMsg(`🌊 Wave ${wave} started (${count} enemies)`, "good");
    }

    function spawnEliteWave() {
      wave++;
      document.getElementById("wave-display").textContent = wave;
      enemies = [];
      const tier = getThreatTier();
      const baseCount = 3 + wave;

      for (let i = 0; i < baseCount; i++) {
        let hp = Math.floor(2 + wave * 0.5);
        let speed = 1;
        let type = "normal";

        /* Threat-reactive scaling */
        if (tier >= 3) hp = Math.floor(hp * 1.1);
        if (tier >= 4) { speed = 2; }
        if (tier >= 5 && i === 0) { type = "elite"; hp = Math.floor(hp * 1.5); }

        enemies.push({ pathIndex: 0, hp, maxHp: hp, alive: true, delay: i * 10, type, speed });
      }

      /* Tier 5: spawn Overseer boss */
      if (tier >= 5 && !overloadTriggered) {
        overloadTriggered = true;
        spawnOverseerBoss();
        logMsg("⚠ TIER 5 OVERLOAD — OVERSEER INCOMING", "warn");
      }

      if (!loopId) loopId = setInterval(gameLoop, 200);
      logMsg(`⚔ Elite Wave ${wave} started (Tier ${tier})`, "elite");
    }

    function spawnOverseerBoss() {
      const hp = 10 + wave * 3;
      enemies.push({ pathIndex: 0, hp, maxHp: hp, alive: true, delay: 5, type: "boss", speed: 1 });
    }

    /* ════════════════════════════════════════════
       GAME LOOP
    ════════════════════════════════════════════ */
    function gameLoop() {
      /* Clear visual enemy markers */
      cells.forEach(c => {
        const e = c.querySelector(".enemy");
        if (e) e.remove();
      });

      /* Move enemies */
      enemies.forEach(e => {
        if (!e.alive) return;
        if (e.delay > 0) { e.delay--; return; }
        e.pathIndex += e.speed;
        if (e.pathIndex >= PATH.length) {
          e.alive = false;
          const dmg = e.type === "boss" ? 3 : e.type === "elite" ? 2 : 1;
          baseHP -= dmg;
          document.getElementById("base-hp").textContent = Math.max(0, baseHP);
          if (baseHP <= 0) { endGame(); return; }
          logMsg(`💥 Enemy reached base! Base HP: ${baseHP}`, "warn");
        }
      });

      /* Draw enemies */
      enemies.forEach(e => {
        if (!e.alive || e.delay > 0 || e.pathIndex >= PATH.length) return;
        const [r, c] = PATH[e.pathIndex];
        const cell = getCell(r, c);
        if (!cell) return;
        const dot = document.createElement("div");
        dot.className = "enemy" + (e.type === "elite" ? " elite" : e.type === "boss" ? " boss" : "");
        cell.appendChild(dot);
      });

      /* Towers attack */
      towers.forEach(t => {
        t.cooldown = Math.max(0, t.cooldown - 1);
        if (t.cooldown > 0) return;
        const target = enemies.find(e => e.alive && e.delay <= 0 && inRange(t, e));
        if (!target) return;
        target.hp -= t.damage;
        t.cooldown = t.level === 2 ? 2 : 3;
        if (target.hp <= 0) {
          target.alive = false;
          const xp = target.type === "boss" ? 50 : target.type === "elite" ? 30 : 15;
          const cr = target.type === "boss" ? 60 : target.type === "elite" ? 30 : 20;
          addCredits(cr);
          addSeasonXP(xp);
          if (eliteMode && target.type === "elite") {
            addItem("ultraShard", 1);
            logMsg("💎 Ultra Shard earned!", "elite");
          }
          if (eliteMode && target.type === "boss") {
            addItem("ultraShard", 3);
            addSeasonXP(1000);
            rebellionState.cosmetics.owned["tower_ultra"] = true;
            saveRebellionState();
            unlockLore("lf_blackvault_truth");
            logMsg("🏆 Boss defeated! Ultra x3, tower_ultra cosmetic, lore unlocked!", "elite");
          }
        }
      });

      /* Wave complete? */
      if (enemies.length > 0 && enemies.every(e => !e.alive)) {
        clearInterval(loopId);
        loopId = null;

        addThreat(eliteMode ? 6 : 3);
        updateHUD();

        let stars = 1;
        if (baseHP >= 7 && wave >= 3) stars = 2;
        if (baseHP >= 9 && wave >= 5) stars = 3;
        setCertification("syndicateSiege", stars);

        const bonus = 100 * stars * (eliteMode ? 2 : 1);
        const xpBonus = 200 * stars * (eliteMode ? 2 : 1);
        addCredits(bonus);
        addSeasonXP(xpBonus);

        if (eliteMode) {
          addItem("ultraShard", stars);
          logMsg(`✅ Elite wave cleared! Stars: ${stars} | +${bonus} cr | +${xpBonus} XP | +${stars} Ultra Shard(s)`, "elite");
        } else {
          logMsg(`✅ Wave ${wave} cleared! Stars: ${stars} | +${bonus} cr | +${xpBonus} XP`, "good");
        }

        overloadTriggered = false;
        setInfo(`Wave ${wave} cleared — <strong>${stars}★</strong>. Press Start Wave for next round.`);
      }
    }

    function inRange(tower, enemy) {
      if (enemy.pathIndex >= PATH.length) return false;
      const [er, ec] = PATH[enemy.pathIndex];
      return Math.abs(er - tower.row) + Math.abs(ec - tower.col) <= tower.range;
    }

    function endGame() {
      clearInterval(loopId);
      loopId = null;
      setInfo("💀 Base destroyed. The Syndicate wins this round.");
      logMsg("💀 GAME OVER — base destroyed", "warn");
    }

    /* ════════════════════════════════════════════
       UPGRADE
    ════════════════════════════════════════════ */
    document.getElementById("upgrade-tower").onclick = () => {
      if (!selectedTower) return;
      if (!spendItem("ultraShard", 1)) {
        logMsg("⚠ Need 1 Ultra Shard to upgrade.", "warn");
        return;
      }
      selectedTower.level = 2;
      selectedTower.damage *= 2;
      selectedTower.range += 1;
      selectedTower.cooldown = Math.max(1, selectedTower.cooldown - 1);
      applyTowerSkin(selectedTower.cellEl, 2);
      logMsg(`⬆ Tower at (${selectedTower.row},${selectedTower.col}) upgraded to Lv 2!`, "elite");
      document.getElementById("upgrade-desc").textContent =
        `Tower now: DMG ${selectedTower.damage} | Range ${selectedTower.range} | CD ${selectedTower.cooldown}`;
      updateHUD();
    };

    document.getElementById("btn-close-upgrade").onclick = () => {
      document.getElementById("upgrade-panel").style.display = "none";
      upgradingMode = false;
      selectedTower = null;
      document.getElementById("btn-upgrade-mode").classList.remove("active");
    };

    /* ════════════════════════════════════════════
       CONTROLS
    ════════════════════════════════════════════ */
    document.getElementById("btn-start-wave").onclick = () => {
      if (loopId) return;
      if (eliteMode) spawnEliteWave();
      else spawnNormalWave();
    };

    document.getElementById("btn-buy-tower").onclick = () => {
      placingTower = !placingTower;
      upgradingMode = false;
      document.getElementById("upgrade-panel").style.display = "none";
      document.getElementById("btn-upgrade-mode").classList.remove("active");
      document.getElementById("btn-buy-tower").classList.toggle("active", placingTower);
      setInfo(placingTower ? "Click an empty non-path cell to place a tower (150 cr)." : "");
    };

    document.getElementById("btn-upgrade-mode").onclick = () => {
      upgradingMode = !upgradingMode;
      placingTower = false;
      document.getElementById("btn-buy-tower").classList.remove("active");
      document.getElementById("btn-upgrade-mode").classList.toggle("active", upgradingMode);
      document.getElementById("upgrade-panel").style.display = upgradingMode ? "block" : "none";
      if (upgradingMode) setInfo("Click a tower cell to select it for upgrade.");
    };

    document.getElementById("btn-elite-toggle").onclick = () => {
      eliteMode = !eliteMode;
      const btn = document.getElementById("btn-elite-toggle");
      btn.textContent = eliteMode ? "Elite Mode: ON" : "Elite Mode: OFF";
      btn.classList.toggle("elite-on", eliteMode);
      logMsg(eliteMode ? "⚔ Elite Mode activated — harder waves, better rewards." : "Elite Mode deactivated.", eliteMode ? "elite" : "");
    };

    /* ════════════════════════════════════════════
       HELPERS
    ════════════════════════════════════════════ */
    function setInfo(html) {
      document.getElementById("info-panel").innerHTML = html;
    }

    function logMsg(text, cls = "") {
      const log = document.getElementById("log");
      const p = document.createElement("p");
      if (cls) p.className = cls;
      p.textContent = text;
      log.prepend(p);
      while (log.children.length > 12) log.removeChild(log.lastChild);
    }

    /* ════════════════════════════════════════════
       BOOT
    ════════════════════════════════════════════ */
    buildGrid();
    setInfo("Build towers, start a wave, defend the base. Toggle Elite Mode for harder enemies and better rewards.");
  </script>
</body>
</html>
