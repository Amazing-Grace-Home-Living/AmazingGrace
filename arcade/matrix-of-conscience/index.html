<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Arcade — Star Matrix</title>
  <meta name="description" content="This Arcade route has been consolidated into Star Matrix.">
  <meta http-equiv="refresh" content="0; url=../star-matrix/">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      background: radial-gradient(circle at 40% 20%, rgba(188,19,254,0.18), transparent 55%),
                  radial-gradient(circle at 60% 80%, rgba(0,242,255,0.12), transparent 60%),
                  #020617;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Inter, sans-serif;
    }
    .card {
      width: min(720px, 100%);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 18px;
      padding: 1.25rem;
      background: rgba(15,23,42,0.65);
      backdrop-filter: blur(10px);
    }
    h1 {
      margin: 0 0 0.25rem;
      font-size: 1.15rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    p { margin: 0.35rem 0 0; color: rgba(226,232,240,0.78); line-height: 1.55; }
    a { color: #fbbf24; text-decoration: none; font-weight: 800; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card" role="status" aria-live="polite">
    <h1>Star Matrix</h1>
    <p>This route has been consolidated into the unified Star Matrix experience.</p>
    <p><a href="../star-matrix/">Continue to Star Matrix →</a></p>
  </div>

  <script>
    (function () {
      try {
        window.location.replace('../star-matrix/');
      } catch (_) {
        window.location.href = '../star-matrix/';
      }
    })();
  </script>
</body>
</html>
