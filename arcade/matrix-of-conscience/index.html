<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="M45 Seven Sisters Alignment — Matrix of Conscience arcade game. Align the Pleiades on a pure black canvas. Amazing Grace Home Living.">
  <meta name="theme-color" content="#000000">
  <link rel="canonical" href="https://amazinggracehl.org/arcade/matrix-of-conscience/">
  <meta property="og:url" content="https://amazinggracehl.org/arcade/matrix-of-conscience/">
  <meta property="og:title" content="Matrix of Conscience | M45 Seven Sisters Alignment">
  <link rel="icon" type="image/png" href="../../assets/logo.png">
  <title>Matrix of Conscience | M45 Seven Sisters Alignment</title>
  <script src="../../assets/vendor/hosted-only.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000000;
      --blue-star: #4fc3f7;
      --red-target: #ef5350;
      --text: #c8e6ff;
      --muted: #7ba8c8;
      --border: rgba(79, 195, 247, 0.25);
    }

    html, body {
      background: var(--black);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }

    /* ── HEADER ── */
    header {
      width: min(100%, 540px);
      text-align: center;
      padding: 1.5rem 0 1rem;
      box-sizing: border-box;
    }

    header h1 {
      font-size: clamp(1.4rem, 5vw, 2rem);
      color: var(--blue-star);
      letter-spacing: 0.08em;
      margin-bottom: 0.3rem;
    }

    header p {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* ── M45 SVG CONSTELLATION MAP ── */
    #m45-map {
      width: min(100%, 540px);
      margin: 0.5rem auto 1rem;
      box-sizing: border-box;
    }

    #m45-map svg {
      display: block;
      width: 100%;
      height: auto;
    }

    /* ── SCOREBOARD ── */
    #scoreboard {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      width: min(100%, 540px);
      box-sizing: border-box;
      padding: 0.5rem 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.75rem;
    }

    .score-item {
      text-align: center;
      font-family: 'Courier New', Courier, monospace;
    }

    .score-label {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .score-value {
      font-size: 1.3rem;
      color: var(--blue-star);
      font-weight: 700;
    }

    /* ── GAME SHELL ── */
    #game-shell {
      width: min(100%, 540px);
      box-sizing: border-box;
      overflow-x: hidden;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    /* ── GRID ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-template-rows: repeat(7, 1fr);
      gap: 3px;
      width: 100%;
      max-width: 450px;
      box-sizing: border-box;
      padding: 6px;
      background: rgba(79, 195, 247, 0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    /* ── TILE ── */
    .tile {
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(79, 195, 247, 0.12);
      border-radius: 4px;
      cursor: pointer;
      touch-action: manipulation;
      font-size: clamp(1.1rem, 4vw, 1.6rem);
      user-select: none;
      transition: background 0.15s, transform 0.1s;
      position: relative;
    }

    .tile:hover {
      background: rgba(79, 195, 247, 0.12);
    }

    .tile.selected {
      background: rgba(79, 195, 247, 0.25);
      border-color: var(--blue-star);
      transform: scale(0.92);
    }

    .tile.is-dragging {
      background: rgba(79, 195, 247, 0.35);
      border-color: var(--blue-star);
      transform: scale(0.88);
      z-index: 10;
    }

    .tile.matched {
      animation: pop 0.3s ease-out forwards;
    }

    @keyframes pop {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.25); opacity: 0.8; }
      100% { transform: scale(0); opacity: 0; }
    }

    /* ── CONTROLS ── */
    #controls {
      display: flex;
      justify-content: center;
      width: min(100%, 540px);
      box-sizing: border-box;
    }

    #reset-btn {
      width: calc(100% - 20px);
      max-width: 300px;
      padding: 12px 0;
      font-size: 16px;
      font-family: 'Courier New', Courier, monospace;
      letter-spacing: 0.1em;
      color: var(--blue-star);
      background: transparent;
      border: 1px solid var(--blue-star);
      border-radius: 6px;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.2s;
    }

    #reset-btn:hover {
      background: rgba(79, 195, 247, 0.1);
    }

    /* ── RESPONSIVE: 400px ── */
    @media (max-width: 400px) {
      #scoreboard {
        gap: 0.75rem;
        font-size: 14px;
      }

      .score-label {
        font-size: 0.6rem;
      }
    }

    /* ── RESPONSIVE: 360px ── */
    @media (max-width: 360px) {
      #scoreboard {
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>Matrix of Conscience</h1>
    <p>M45 Seven Sisters Alignment &nbsp;·&nbsp; Pleiades Protocol</p>
  </header>

  <!-- M45 INLINE SVG CONSTELLATION MAP (7 Blue Stars + 1 Enhanced Red Spectral Target) -->
  <div id="m45-map" aria-label="M45 Pleiades constellation map">
    <svg viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg"
         role="img" aria-label="M45 Seven Sisters constellation with Enhanced Red Spectral Target">
      <title>M45 Pleiades — Seven Blue Sisters + Enhanced Red Spectral Target</title>

      <!-- Constellation lines connecting the Seven Sisters -->
      <g stroke="#4fc3f7" stroke-width="0.6" opacity="0.35">
        <line x1="60"  y1="55"  x2="90"  y2="35"/>
        <line x1="90"  y1="35"  x2="130" y2="45"/>
        <line x1="130" y1="45" x2="160" y2="30"/>
        <line x1="160" y1="30" x2="200" y2="50"/>
        <line x1="200" y1="50" x2="230" y2="40"/>
        <line x1="230" y1="40" x2="260" y2="60"/>
        <line x1="130" y1="45" x2="160" y2="75"/>
      </g>

      <!-- Blue Star 1 — Alcyone (brightest) -->
      <g transform="translate(160,30)">
        <circle r="7" fill="#4fc3f7" opacity="0.9"/>
        <circle r="12" fill="none" stroke="#4fc3f7" stroke-width="0.8" opacity="0.3"/>
        <text y="22" text-anchor="middle" font-size="7" fill="#4fc3f7" opacity="0.7"
              font-family="'Courier New',Courier,monospace">Alcyone</text>
      </g>

      <!-- Blue Star 2 — Atlas -->
      <g transform="translate(60,55)">
        <circle r="5" fill="#4fc3f7" opacity="0.85"/>
        <circle r="9" fill="none" stroke="#4fc3f7" stroke-width="0.6" opacity="0.25"/>
        <text y="20" text-anchor="middle" font-size="6.5" fill="#4fc3f7" opacity="0.65"
              font-family="'Courier New',Courier,monospace">Atlas</text>
      </g>

      <!-- Blue Star 3 — Electra -->
      <g transform="translate(90,35)">
        <circle r="5" fill="#4fc3f7" opacity="0.85"/>
        <circle r="9" fill="none" stroke="#4fc3f7" stroke-width="0.6" opacity="0.25"/>
        <text y="20" text-anchor="middle" font-size="6.5" fill="#4fc3f7" opacity="0.65"
              font-family="'Courier New',Courier,monospace">Electra</text>
      </g>

      <!-- Blue Star 4 — Maia -->
      <g transform="translate(130,45)">
        <circle r="5.5" fill="#4fc3f7" opacity="0.85"/>
        <circle r="10" fill="none" stroke="#4fc3f7" stroke-width="0.6" opacity="0.25"/>
        <text y="22" text-anchor="middle" font-size="6.5" fill="#4fc3f7" opacity="0.65"
              font-family="'Courier New',Courier,monospace">Maia</text>
      </g>

      <!-- Blue Star 5 — Merope -->
      <g transform="translate(160,75)">
        <circle r="4.5" fill="#4fc3f7" opacity="0.8"/>
        <circle r="8" fill="none" stroke="#4fc3f7" stroke-width="0.6" opacity="0.2"/>
        <text y="19" text-anchor="middle" font-size="6.5" fill="#4fc3f7" opacity="0.65"
              font-family="'Courier New',Courier,monospace">Merope</text>
      </g>

      <!-- Blue Star 6 — Taygeta -->
      <g transform="translate(200,50)">
        <circle r="5" fill="#4fc3f7" opacity="0.85"/>
        <circle r="9" fill="none" stroke="#4fc3f7" stroke-width="0.6" opacity="0.25"/>
        <text y="20" text-anchor="middle" font-size="6.5" fill="#4fc3f7" opacity="0.65"
              font-family="'Courier New',Courier,monospace">Taygeta</text>
      </g>

      <!-- Blue Star 7 — Celaeno -->
      <g transform="translate(230,40)">
        <circle r="4.5" fill="#4fc3f7" opacity="0.8"/>
        <circle r="8" fill="none" stroke="#4fc3f7" stroke-width="0.6" opacity="0.2"/>
        <text y="19" text-anchor="middle" font-size="6.5" fill="#4fc3f7" opacity="0.65"
              font-family="'Courier New',Courier,monospace">Celaeno</text>
      </g>

      <!-- Enhanced Red Spectral Target — Sterope (M45 emission nebula marker) -->
      <g transform="translate(260,60)">
        <circle r="6" fill="#ef5350" opacity="0.9"/>
        <circle r="11" fill="none" stroke="#ef5350" stroke-width="1" opacity="0.5"/>
        <circle r="16" fill="none" stroke="#ef5350" stroke-width="0.5" opacity="0.25"/>
        <!-- Cross-hair indicator for spectral target -->
        <line x1="-4" y1="0" x2="4" y2="0" stroke="#ef5350" stroke-width="1" opacity="0.8"/>
        <line x1="0" y1="-4" x2="0" y2="4" stroke="#ef5350" stroke-width="1" opacity="0.8"/>
        <text y="27" text-anchor="middle" font-size="6.5" fill="#ef5350" opacity="0.8"
              font-family="'Courier New',Courier,monospace">Sterope ★</text>
      </g>

      <!-- M45 label -->
      <text x="160" y="112" text-anchor="middle" font-size="8" fill="#4fc3f7" opacity="0.45"
            font-family="'Courier New',Courier,monospace" letter-spacing="0.15em">
        M45 · PLEIADES · 444 LY
      </text>
    </svg>
  </div>

  <!-- SCOREBOARD -->
  <div id="scoreboard" role="status" aria-live="polite">
    <div class="score-item">
      <div class="score-label">Stellar Points</div>
      <div class="score-value" id="score-display">0</div>
    </div>
    <div class="score-item">
      <div class="score-label">High Score</div>
      <div class="score-value" id="high-score-display">0</div>
    </div>
    <div class="score-item">
      <div class="score-label">Level</div>
      <div class="score-value" id="level-display">1</div>
    </div>
  </div>

  <!-- GAME SHELL -->
  <div id="game-shell">

    <!-- 7×7 ALIGNMENT GRID -->
    <div id="grid" role="grid" aria-label="M45 alignment matrix"></div>

    <!-- CONTROLS -->
    <div id="controls">
      <button id="reset-btn" type="button">Reset Calibration</button>
    </div>

  </div>

  <script type="module">
    import { GRID_SIZE, createInitialGrid, applySwap, findMatches, applyMatches, applyGravity } from '../../js/matchmaker.js';

    /* ── STAR SYMBOLS for the 7×7 grid ── */
    const STAR_SYMBOLS = ['⭐', '🌟', '💫', '✨', '🔵', '🔷', '🟣'];

    /* ── STATE ── */
    let gridData = createInitialGrid();
    let score = 0;
    let level = 1;
    let currentDragPath = [];
    let dragActive = false;

    const HIGH_SCORE_KEY = 'matrix_high_score';

    function loadHighScore() {
      try { return parseInt(localStorage.getItem(HIGH_SCORE_KEY) || '0', 10) || 0; } catch { return 0; }
    }

    function saveHighScore(val) {
      try { localStorage.setItem(HIGH_SCORE_KEY, String(val)); } catch { /* noop */ }
    }

    /* ── DOM REFERENCES ── */
    const gridEl        = document.getElementById('grid');
    const scoreEl       = document.getElementById('score-display');
    const highScoreEl   = document.getElementById('high-score-display');
    const levelEl       = document.getElementById('level-display');
    const resetBtn      = document.getElementById('reset-btn');

    function parseTileCoords(tile) {
      if (!tile) return null;
      const row = Number.parseInt(tile.dataset.row ?? '', 10);
      const col = Number.parseInt(tile.dataset.col ?? '', 10);
      if (!Number.isFinite(row) || !Number.isFinite(col)) return null;
      return { row, col };
    }

    function areAdjacentTiles(tileA, tileB) {
      const start = parseTileCoords(tileA);
      const end = parseTileCoords(tileB);
      if (!start || !end) return false;

      return (
        (Math.abs(start.row - end.row) === 1 && start.col === end.col) ||
        (Math.abs(start.col - end.col) === 1 && start.row === end.row)
      );
    }

    function resolveBoard(nextGrid) {
      let resolvedGrid = nextGrid;
      let clearedCells = 0;

      while (true) {
        const matchResult = findMatches(resolvedGrid);
        if (matchResult.matches.length === 0) break;
        clearedCells += matchResult.matches.length;
        resolvedGrid = applyMatches(resolvedGrid, matchResult);
        resolvedGrid = applyGravity(resolvedGrid);
      }

      return { resolvedGrid, clearedCells };
    }

    /* ── RENDER ── */
    function renderGrid() {
      gridEl.innerHTML = '';
      for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
          const gem = gridData[r][c];
          const kind = typeof gem === 'string' ? gem : gem?.kind ?? 'star';
          const symbolIndex = ['heart','star','cross','flame','drop'].indexOf(kind);
          const symbol = STAR_SYMBOLS[symbolIndex >= 0 ? symbolIndex : 1];

          const tile = document.createElement('div');
          tile.className = 'tile';
          tile.textContent = symbol;
          tile.dataset.row = r;
          tile.dataset.col = c;
          tile.setAttribute('role', 'gridcell');
          tile.setAttribute('aria-label', `${kind} at row ${r + 1}, column ${c + 1}`);

          tile.addEventListener('pointerdown', handlePointerDown);
          tile.addEventListener('pointerenter', handlePointerEnter);

          gridEl.appendChild(tile);
        }
      }
    }

    /* ── SELECTION / DRAG ── */
    function handleSelection(startTile, endTile) {
      if (!startTile || !endTile || startTile === endTile || !areAdjacentTiles(startTile, endTile)) return;

      const start = parseTileCoords(startTile);
      const end = parseTileCoords(endTile);
      if (!start || !end) return;

      const swappedGrid = applySwap(gridData, start.row, start.col, end.row, end.col);
      const { resolvedGrid, clearedCells } = resolveBoard(swappedGrid);
      if (clearedCells === 0) return;

      score += clearedCells * 10 * level;
      gridData = resolvedGrid;
      updateScore();
      renderGrid();
    }

    function handlePointerDown(e) {
      e.preventDefault();
      const tile = e.currentTarget;
      currentDragPath = [tile];
      dragActive = true;
      tile.classList.add('is-dragging');
      tile.setPointerCapture(e.pointerId);
    }

    function handlePointerEnter(e) {
      if (!dragActive) return;
      const tile = e.currentTarget;
      if (!currentDragPath.includes(tile)) {
        currentDragPath.push(tile);
        tile.classList.add('is-dragging');
      }
    }

    function handlePointerUp(e) {
      if (!dragActive) return;
      dragActive = false;
      currentDragPath.forEach(t => t.classList.remove('is-dragging'));

      if (currentDragPath.length >= 2) {
        handleSelection(currentDragPath[0], currentDragPath[currentDragPath.length - 1]);
      }
      currentDragPath = [];
    }

    window.addEventListener('pointerup', handlePointerUp);

    /* ── SCORE ── */
    function updateScore() {
      scoreEl.textContent = String(score);
      const hi = loadHighScore();
      if (score > hi) saveHighScore(score);
      highScoreEl.textContent = String(Math.max(score, hi));
      level = 1 + Math.floor(score / 200);
      levelEl.textContent = String(level);
    }

    /* ── RESET ── */
    resetBtn.addEventListener('click', () => {
      gridData = createInitialGrid();
      score = 0;
      level = 1;
      currentDragPath = [];
      dragActive = false;
      updateScore();
      renderGrid();
    });

    /* ── INIT ── */
    highScoreEl.textContent = String(loadHighScore());
    renderGrid();
  </script>

</body>
</html>
