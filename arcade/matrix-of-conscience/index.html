<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix of Conscience - M45 Calibration</title>
    <style>
        :root {
            /* Astronomical Color Palette */
            --space-black: #000000;
            --pleiades-blue: #00e5ff;
            --pleiades-glow: rgba(0, 229, 255, 0.4);
            --star-red: #ff3b30;
            --star-red-glow: rgba(255, 59, 48, 0.5);
            --amber-selected: #ffb000;
        }

        body {
            background-color: var(--space-black);
            color: var(--pleiades-blue);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Keyboard Accessibility Indicator */
        *:focus-visible {
            outline: 3px solid var(--amber-selected);
            outline-offset: 2px;
        }

        #game-container {
            text-align: center;
            border: 1px solid var(--pleiades-blue);
            padding: 24px;
            box-shadow: 0 0 30px var(--pleiades-glow);
            background: rgba(0, 0, 0, 0.95);
            z-index: 10;
            border-radius: 4px;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
            font-size: 1.4rem;
            color: #ffffff;
            text-shadow: 0 0 10px var(--pleiades-blue);
        }

        .subtitle {
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: var(--pleiades-blue);
            opacity: 0.8;
            margin-bottom: 20px;
        }

        #scoreboard {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border-bottom: 1px dashed rgba(0, 229, 255, 0.4);
            padding-bottom: 12px;
        }

        /* Border-Only Grid: Clean Alignment without Visual Bloat */
        #grid {
            display: grid;
            grid-template-columns: repeat(5, 60px);
            grid-template-rows: repeat(5, 60px);
            gap: 8px;
            background-color: #000000;
            padding: 12px;
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 4px;
            margin: 0 auto;
            width: max-content;
        }

        /* Individual Star Node Formats */
        .tile {
            width: 60px;
            height: 60px;
            background: #000000;
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s ease, border-color 0.2s ease;
        }

        /* Accurate M45 Spectral Tuning */
        .tile[data-type="blue"] { color: var(--pleiades-blue); text-shadow: 0 0 8px var(--pleiades-blue); }
        .tile[data-type="red"] { color: var(--star-red); text-shadow: 0 0 8px var(--star-red); }
        
        .tile:hover {
            border-color: var(--pleiades-blue);
            box-shadow: 0 0 8px var(--pleiades-glow);
        }

        .tile.selected {
            border: 2px solid var(--amber-selected);
            transform: scale(0.95);
        }

        #controls {
            margin-top: 24px;
        }

        .btn {
            background-color: transparent;
            color: #ffffff;
            border: 1px solid var(--pleiades-blue);
            padding: 10px 24px;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: var(--pleiades-blue);
            color: var(--space-black);
            box-shadow: 0 0 15px var(--pleiades-blue);
        }

        /* Deep Ambient Star Field Canvas */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <div id="game-container" role="application" aria-label="Matrix of Conscience M45 Engine">
        <h1>Matrix of Conscience</h1>
        <div class="subtitle">M45 Seven Sisters Alignment</div>
                
        <div id="scoreboard">
            <div>Stellar Points: <span id="score-display">0</span></div>
            <div>High Score: <span id="high-score-display">0</span></div>
        </div>    
    
        <div id="grid" role="grid" aria-label="Sequence Alignment Grid"></div>
        
        <div id="controls">
            <button class="btn" id="reset-btn" onclick="initGrid()">Reset Calibration</button>
        </div>
    </div>

    <script>
        // --- 1. Ambient Background Starfield (Deep Field Physics) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const starsCount = 120;
        const starField = Array.from({ length: starsCount }).map(() => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 1.5,
            color: Math.random() > 0.12 ? '#00e5ff' : '#ff3b30', // Accurate spectrum classification split
            alpha: Math.random()
        }));

        function drawStarField() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            starField.forEach(star => {
                ctx.save();
                ctx.globalAlpha = star.alpha;
                ctx.fillStyle = star.color;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                
                // Subtle organic shimmering loop
                star.alpha += (Math.random() - 0.5) * 0.04;
                if (star.alpha < 0) star.alpha = 0;
                if (star.alpha > 1) star.alpha = 1;
            });
        }
        setInterval(drawStarField, 100);

        // --- 2. Alignment Token Parameters (M45 Structural Nodes) ---
        const starNodes = [
            { symbol: '★', type: 'blue' }, // Alcyone
            { symbol: '⭐', type: 'blue' }, // Maia
            { symbol: '🔷', type: 'blue' }, // Electra
            { symbol: '♦', type: 'blue' },  // Taygeta
            { symbol: '⬢', type: 'red' }   // Saturated Red Spectral Focus Node
        ];
        
        const gridSize = 5;
        let score = 0;
        let highScore = localStorage.getItem('matrix_high_score') || 0;
        let gridData = [];
        let selectedTile = null;
        document.getElementById('high-score-display').innerText = highScore;

        function initGrid() {
            score = 0;
            updateScore(0);
            const gridElement = document.getElementById('grid');
            gridElement.innerHTML = '';
            gridData = [];

            for (let r = 0; r < gridSize; r++) {
                gridData[r] = [];
                for (let c = 0; c < gridSize; c++) {
                    let node;
                    // Mathematical logic to prevent starting grid match clusters
                    do {
                        node = starNodes[Math.floor(Math.random() * starNodes.length)];
                    } while (
                        (c >= 2 && gridData[r][c-1].symbol === node.symbol && gridData[r][c-2].symbol === node.symbol) ||
                        (r >= 2 && gridData[r-1][c].symbol === node.symbol && gridData[r-2][c].symbol === node.symbol)
                    );
                    gridData[r][c] = node;
                    createTileElement(r, c, node);
                }
            }
        }

        function createTileElement(r, c, node) {
            const gridElement = document.getElementById('grid');
            const tile = document.createElement('div');
            tile.classList.add('tile');
            tile.innerText = node.symbol;
            tile.setAttribute('data-type', node.type);
            tile.dataset.row = r;
            tile.dataset.col = c;
            
            tile.setAttribute('role', 'gridcell');
            tile.setAttribute('tabindex', '0');
            tile.setAttribute('aria-label', `Row ${r + 1}, Column ${c + 1}: ${node.symbol}`);

            tile.addEventListener('click', () => handleSelection(r, c, tile));
            tile.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    handleSelection(r, c, tile);
                }
            });
            gridElement.appendChild(tile);
        }

        function handleSelection(r, c, tileElement) {
            if (!selectedTile) {
                selectedTile = { r, c, element: tileElement };
                tileElement.classList.add('selected');
            } else {
                const prevTile = selectedTile;
                const isAdjacent = (Math.abs(prevTile.r - r) === 1 && prevTile.c === c) ||
                                  (Math.abs(prevTile.c - c) === 1 && prevTile.r === r);
                prevTile.element.classList.remove('selected');
                selectedTile = null;

                if (isAdjacent) {
                    let temp = gridData[prevTile.r][prevTile.c];
                    gridData[prevTile.r][prevTile.c] = gridData[r][c];
                    gridData[r][c] = temp;
                    
                    if (!checkAndClearMatches()) {
                        // Revert matrix state if invalid swap sequence
                        temp = gridData[prevTile.r][prevTile.c];
                        gridData[prevTile.r][prevTile.c] = gridData[r][c];
                        gridData[r][c] = temp;
                    } else {
                        renderGridFromData();
                    }
                }
            }
        }

        function checkAndClearMatches() {
            let matched = Array.from({ length: gridSize }, () => Array(gridSize).fill(false));
            let hasMatch = false;

            // Matrix Row Vector Sweep
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize - 2; c++) {
                    if (gridData[r][c] && gridData[r][c].symbol === gridData[r][c+1].symbol && gridData[r][c].symbol === gridData[r][c+2].symbol) {
                        matched[r][c] = matched[r][c+1] = matched[r][c+2] = true;
                        hasMatch = true;
                    }
                }
            }
            // Matrix Column Vector Sweep
            for (let r = 0; r < gridSize - 2; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (gridData[r][c] && gridData[r][c].symbol === gridData[r+1][c].symbol && gridData[r][c].symbol === gridData[r+2][c].symbol) {
                        matched[r][c] = matched[r+1][c] = matched[r+2][c] = true;
                        hasMatch = true;
                    }
                }
            }

            if (hasMatch) {
                let matchCount = 0;
                for (let r = 0; r < gridSize; r++) {
                    for (let c = 0; c < gridSize; c++) {
                        if (matched[r][c]) {
                            gridData[r][c] = null;
                            matchCount++;
                        }
                    }
                }
                updateScore(matchCount * 10);
                cascadeTiles();
                return true;
            }
            return false;
        }

        function cascadeTiles() {
            for (let c = 0; c < gridSize; c++) {
                let emptyRow = gridSize - 1;
                for (let r = gridSize - 1; r >= 0; r--) {
                    if (gridData[r][c] !== null) {
                        gridData[emptyRow][c] = gridData[r][c];
                        if (emptyRow !== r) gridData[r][c] = null;
                        emptyRow--;
                    }
                }
                for (let r = emptyRow; r >= 0; r--) {
                    gridData[r][c] = starNodes[Math.floor(Math.random() * starNodes.length)];
                }
            }
            setTimeout(() => {
                renderGridFromData();
                if (checkAndClearMatches()) {
                    renderGridFromData();
                }
            }, 250);
        }

        function renderGridFromData() {
            const gridElement = document.getElementById('grid');
            gridElement.innerHTML = '';
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (gridData[r][c]) createTileElement(r, c, gridData[r][c]);
                }
            }
        }

        function updateScore(points) {
            score += points;
            document.getElementById('score-display').innerText = score;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('matrix_high_score', highScore);
                document.getElementById('high-score-display').innerText = highScore;
            }
        }

        initGrid();
    </script>
</body>
</html>
