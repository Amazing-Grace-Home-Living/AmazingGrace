<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Star Matrix — match constellations on a 7×7 board. Swipe adjacent stars, chain combos, and reach 1000 points." />
    <meta name="theme-color" content="#050610" />
    <link rel="icon" type="image/png" href="../../assets/logo-S7NXL_ug.png" />
    <title>Star Matrix | Amazing Grace</title>
    <style>
      :root {
        --bg: #090d16;
        --panel: rgba(15, 23, 42, 0.6);
        --border: #1e293b;
        --accent: #00f2ff;
        --text: #cbd5e1;
        --muted: #94a3b8;
      }

      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: 'Outfit', monospace, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
      }

      .topbar {
        width: 100%;
        padding: 1rem 1.25rem;
        border-bottom: 1px solid var(--border);
        background: rgba(5, 6, 16, 0.75);
        backdrop-filter: blur(10px);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }
      .topbar a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      .topbar a:hover { text-decoration: underline; }

      .shell {
        width: min(100%, 720px);
        margin: 0 auto;
        padding: 1.25rem 1.25rem 2rem;
      }

      .header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        margin: 0.75rem 0 1rem;
      }
      .header h1 {
        margin: 0;
        font-size: clamp(1.5rem, 4vw, 2.1rem);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--accent);
        text-shadow: 0 0 10px rgba(0,242,255,0.4);
      }
      .header p {
        margin: 0.35rem 0 0;
        color: var(--muted);
        line-height: 1.5;
        max-width: 46ch;
      }

      .hud {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        justify-content: flex-end;
        align-items: center;
      }
      .hud-pill {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 0.5rem 0.75rem;
        font-size: 0.85rem;
        color: var(--muted);
        min-width: 10ch;
        text-align: center;
      }
      .hud-pill strong { color: var(--text); }

      .board-wrap {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 1rem;
      }

      #board {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        grid-template-rows: repeat(7, 1fr);
        gap: 8px;
        width: 100%;
        max-width: 540px;
        margin: 0 auto;
        touch-action: manipulation;
      }

      .star-cell {
        aspect-ratio: 1 / 1;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(30, 41, 59, 0.4);
        display: grid;
        place-items: center;
        font-size: clamp(1.2rem, 5vw, 2rem);
        user-select: none;
        cursor: pointer;
        transition: transform 120ms ease, border-color 120ms ease, background 120ms ease, box-shadow 120ms ease;
      }
      .star-cell:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }
      .star-cell.selected {
        border-color: var(--accent);
        background: rgba(0, 242, 255, 0.15);
        box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        transform: translateY(-2px) scale(1.05);
      }
      .star-cell.is-processing { cursor: progress; }

      .star-cell[data-kind="heart"] { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
      .star-cell[data-kind="star"] { color: #facc15; text-shadow: 0 0 10px #facc15; }
      .star-cell[data-kind="cross"] { color: #a855f7; text-shadow: 0 0 10px #a855f7; }
      .star-cell[data-kind="flame"] { color: #ef4444; text-shadow: 0 0 10px #ef4444; }
      .star-cell[data-kind="drop"] { color: #22c55e; text-shadow: 0 0 10px #22c55e; }

      .board-shake {
        animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
      }
      @keyframes shake {
        0%, 100% { transform: translate(0, 0); }
        25% { transform: translate(-3px, 2px); }
        50% { transform: translate(3px, -2px); }
        75% { transform: translate(-3px, -2px); }
      }

      .controls {
        display: flex;
        justify-content: center;
        gap: 0.75rem;
        margin-top: 1rem;
        flex-wrap: wrap;
      }
      button {
        appearance: none;
        border: 1px solid var(--accent);
        background: rgba(0, 242, 255, 0.1);
        color: var(--accent);
        border-radius: 12px;
        padding: 0.75rem 1rem;
        font-weight: 800;
        min-height: 44px;
        cursor: pointer;
        letter-spacing: 0.03em;
      }
      button:hover { background: rgba(0, 242, 255, 0.2); box-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }
      button:disabled { opacity: 0.6; cursor: not-allowed; }

      .status {
        text-align: center;
        color: var(--muted);
        margin-top: 0.75rem;
        min-height: 1.25rem;
      }
    </style>
    <script type="module" crossorigin src="../../assets/arcadeStarMatrix-B_dL7G4Q.js"></script>
    <link rel="modulepreload" crossorigin href="../../assets/modulepreload-polyfill-Dezn_h7o.js">
  </head>
  <body>
    <header class="topbar">
      <a href="../" aria-label="Back to Arcade">← Arcade</a>
      <a href="../../" aria-label="Amazing Grace Home Living">amazinggracehl.org</a>
    </header>

    <main class="shell">
      <div class="header">
        <div>
          <h1>Star Matrix</h1>
          <p>Swipe adjacent stars. Chain matches to reach <strong>1000</strong> points.</p>
        </div>
        <div class="hud" aria-label="Scoreboard">
          <div class="hud-pill">Score: <strong id="score">0</strong></div>
          <div class="hud-pill">High: <strong id="high">0</strong></div>
        </div>
      </div>

      <section class="board-wrap" aria-label="Star Matrix board">
        <div id="board" role="grid" aria-label="Star Matrix board grid"></div>
        <div class="controls">
          <button id="reset-btn" type="button">Reset</button>
          <a id="certificate-link" href="../certificates/" style="display:none; text-decoration:none;">
            <button type="button">Claim Certificate</button>
          </a>
        </div>
        <div id="status" class="status" aria-live="polite"></div>
      </section>
    </main>

  </body>
</html>
