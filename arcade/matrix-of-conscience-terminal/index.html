<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Trinity Terminal — The Matrix of Conscience. A terminal-based interface to the match-3 simulation.">
  <title>Trinity Terminal | Matrix of Conscience</title>
  <link rel="icon" type="image/png" href="../../assets/logo.png">
  <style>
    :root {
      --bg: #0a0e27;
      --surface: #0f1425;
      --border: #1a2847;
      --text: #d0d9e8;
      --muted: #8a94a6;
      --green: #00ff00;
      --accent: #00d9ff;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; }
    
    body {
      font-family: 'Courier New', monospace;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
      overflow: hidden;
    }

    .terminal-container {
      width: 100%;
      max-width: 600px;
      height: 100vh;
      max-height: 700px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .terminal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 20, 37, 0.8);
      font-size: 0.75rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .header-icon {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
    }

    .kill-button {
      background: none;
      border: none;
      color: #ff3d3d;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: bold;
      padding: 0.25rem 0.5rem;
      transition: color 150ms;
    }

    .kill-button:hover {
      color: #ff5555;
    }

    .terminal-content {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      font-size: 0.875rem;
      line-height: 1.5;
    }

    .terminal-line {
      font-family: 'Courier New', monospace;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .terminal-line.command {
      color: var(--accent);
      font-weight: bold;
    }

    .terminal-line.prompt {
      color: var(--green);
      font-weight: bold;
    }

    .terminal-line.system {
      color: var(--accent);
    }

    .terminal-line.oracle {
      color: #ffa500;
    }

    .terminal-line.image {
      color: #00aaff;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .game-view {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }

    .game-view.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 1rem;
      background: rgba(26, 40, 71, 0.5);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 1rem;
    }

    .game-tile {
      aspect-ratio: 1;
      border: 1px solid var(--border);
      background: rgba(26, 40, 71, 0.8);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      transition: all 150ms;
      user-select: none;
    }

    .game-tile:hover {
      background: rgba(26, 40, 71, 1);
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .game-tile.active {
      background: rgba(0, 217, 255, 0.2);
      border-color: var(--accent);
    }

    .terminal-input {
      display: flex;
      gap: 0.5rem;
      padding: 1rem;
      border-top: 1px solid var(--border);
      background: rgba(15, 20, 37, 0.8);
    }

    .terminal-input input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'Courier New', monospace;
      font-size: 0.875rem;
      outline: none;
      padding: 0.25rem 0;
    }

    .terminal-input input::placeholder {
      color: var(--muted);
    }

    .terminal-input button {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 1rem;
      padding: 0;
      transition: color 150ms;
    }

    .terminal-input button:hover {
      color: var(--text);
    }

    /* Scrollbar styling */
    .terminal-content::-webkit-scrollbar {
      width: 8px;
    }

    .terminal-content::-webkit-scrollbar-track {
      background: transparent;
    }

    .terminal-content::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    .terminal-content::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }

    @media (max-width: 480px) {
      .terminal-container {
        max-width: 100%;
        border-radius: 8px;
      }

      .terminal-content {
        font-size: 0.8rem;
      }

      .game-grid {
        gap: 8px;
        padding: 0.75rem;
      }

      .game-tile {
        font-size: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <div class="terminal-container">
    <!-- Header -->
    <div class="terminal-header">
      <div class="header-left">
        <div class="header-icon">⚙️</div>
        <span>TRINITY_PS_SESSION</span>
      </div>
      <button class="kill-button" id="killBtn" style="display: none;">KILL_TASK</button>
    </div>

    <!-- Content Area -->
    <div class="terminal-content" id="terminalContent">
      <div class="terminal-line prompt">PS C:\Trinity> System online.</div>
      <div class="terminal-line prompt">PS C:\Trinity> Commands: Start, Oracle &lt;q&gt;, Generate &lt;desc&gt;</div>
    </div>

    <!-- Game View -->
    <div class="game-view" id="gameView">
      <div class="game-grid" id="gameGrid"></div>
      <button id="backBtn" style="
        padding: 0.5rem 1rem;
        background: rgba(0, 217, 255, 0.2);
        border: 1px solid var(--border);
        color: var(--accent);
        cursor: pointer;
        border-radius: 4px;
        font-family: 'Courier New', monospace;
        font-size: 0.875rem;
        transition: all 150ms;
      " onmouseover="this.style.background='rgba(0, 217, 255, 0.3)'" onmouseout="this.style.background='rgba(0, 217, 255, 0.2)'">Return to Terminal</button>
    </div>

    <!-- Input -->
    <div class="terminal-input">
      <input 
        type="text" 
        id="commandInput" 
        placeholder="PS C:\Trinity>" 
        autocomplete="off"
      >
      <button id="sendBtn">⏎</button>
    </div>
  </div>

  <script>
    const terminalContent = document.getElementById('terminalContent');
    const commandInput = document.getElementById('commandInput');
    const sendBtn = document.getElementById('sendBtn');
    const killBtn = document.getElementById('killBtn');
    const gameView = document.getElementById('gameView');
    const gameGrid = document.getElementById('gameGrid');
    const backBtn = document.getElementById('backBtn');

    let isGameMode = false;
    let gameGridData = Array.from({ length: 16 }, () => Math.floor(Math.random() * 4));
    const symbols = ['✓', '◆', '○', '★'];

    function addLine(text, className = 'terminal-line') {
      const line = document.createElement('div');
      line.className = className;
      line.textContent = text;
      terminalContent.appendChild(line);
      terminalContent.scrollTop = terminalContent.scrollHeight;
    }

    function handleCommand(cmd) {
      const lower = cmd.toLowerCase().trim();
      
      addLine(`PS C:\\Trinity> ${cmd}`, 'terminal-line command');

      if (lower === 'start') {
        isGameMode = true;
        killBtn.style.display = 'block';
        gameView.classList.add('active');
        terminalContent.style.display = 'none';
        addLine('SYSTEM: Launching Match-3 Matrix...', 'terminal-line system');
        renderGame();
      } else if (lower.startsWith('oracle')) {
        const query = lower.substring(6).trim();
        const response = query 
          ? `ORACLE: The answer to "${query}" lies in the balance of the grid.`
          : 'ORACLE: Seek the balance within the grid.';
        addLine(response, 'terminal-line oracle');
      } else if (lower.startsWith('generate')) {
        const desc = lower.substring(8).trim();
        const prompt = desc || 'quantum artifact';
        addLine('SYSTEM: Quantum rendering...', 'terminal-line image');
        setTimeout(() => {
          addLine(`IMAGE: ${prompt} rendered successfully.`, 'terminal-line image');
        }, 2000);
      } else if (lower === '') {
        // Empty command, ignore
      } else {
        addLine('ERROR: Command not found.', 'terminal-line');
      }
    }

    function renderGame() {
      gameGrid.innerHTML = '';
      for (let i = 0; i < 16; i++) {
        const tile = document.createElement('div');
        tile.className = 'game-tile';
        tile.textContent = symbols[gameGridData[i]];
        tile.dataset.index = i;
        tile.addEventListener('click', () => {
          gameGridData[i] = (gameGridData[i] + 1) % 4;
          tile.textContent = symbols[gameGridData[i]];
        });
        gameGrid.appendChild(tile);
      }
    }

    function exitGame() {
      isGameMode = false;
      killBtn.style.display = 'none';
      gameView.classList.remove('active');
      terminalContent.style.display = 'flex';
      addLine('SYSTEM: Matrix simulation terminated.', 'terminal-line system');
    }

    sendBtn.addEventListener('click', () => {
      const cmd = commandInput.value;
      if (cmd.trim()) {
        handleCommand(cmd);
        commandInput.value = '';
      }
    });

    commandInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const cmd = commandInput.value;
        if (cmd.trim()) {
          handleCommand(cmd);
          commandInput.value = '';
        }
      }
    });

    killBtn.addEventListener('click', exitGame);
    backBtn.addEventListener('click', exitGame);

    // Focus input on page load
    commandInput.focus();
  </script>
</body>
</html>
