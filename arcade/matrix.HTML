<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Matrix of Conscience</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            color: #00ff00;
        }
        #cinema-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        #skip-button {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 20;
            background: rgba(0, 255, 0, 0.1);
            color: #00ff00;
            border: 2px solid #00ff00;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            transition: all 0.3s ease;
        }
        #skip-button:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 20px #00ff00;
        }
        #game-layer {
            display: none;
            width: 100%;
            height: 100%;
            padding: 40px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        #game-layer.active {
            display: flex;
            opacity: 1;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ff00;
        }
        p {
            font-size: 1.2rem;
            max-width: 600px;
            line-height: 1.6;
            color: #88ff88;
        }
    </style>
</head>
<body>

    <div id="cinema-layer">
        <div class="video-container">
            <div id="player"></div>
        </div>
        <button id="skip-button" onclick="enterTheMatrix()">Enter The Matrix</button>
    </div>

    <div id="game-layer">
        <h1>THE MATRIX OF CONSCIENCE</h1>
        <p>[ System Initialized ]</p>
        <p>Every choice balances technical scale against ethical truth. The interface is yours. Choose wisely.</p>
        </div>

    <script>
        // Load the YouTube IFrame Player API asynchronously
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        // Array tracking playlist: [Video 1 (Short), Video 2 (Deep Dive)]
        var playlist = ['EOOcReGQVuo', 'lqf90E7bucs'];
        var currentVideoIndex = 0;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: playlist[currentVideoIndex],
                playerVars: {
                    'autoplay': 1,
                    'controls': 0,
                    'rel': 0,
                    'showinfo': 0,
                    'modestbranding': 1,
                    'loop': 0,
                    'fs': 0,
                    'cc_load_policy': 0,
                    'iv_load_policy': 3,
                    'autohide': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            event.target.playVideo();
        }

        function onPlayerStateChange(event) {
            // Check if the current video has ended (YT.PlayerState.ENDED = 0)
            if (event.data === YT.PlayerState.ENDED) {
                currentVideoIndex++;
                if (currentVideoIndex < playlist.length) {
                    // Load and play the next video in sequence
                    player.loadVideoById({
                        videoId: playlist[currentVideoIndex]
                    });
                } else {
                    // No more videos left, transition to game
                    enterTheMatrix();
                }
            }
        }

        function enterTheMatrix() {
            // Cleanly stop video playback
            if (player && typeof player.stopVideo === 'function') {
                player.stopVideo();
            }
            
            // Remove cinema screen and activate the interactive interface
            document.getElementById('cinema-layer').style.display = 'none';
            var gameLayer = document.getElementById('game-layer');
            gameLayer.classList.add('active');
        }
    </script>
</body>
</html>
