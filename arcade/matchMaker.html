<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Matrix: Alignment Protocol</title>
    <style>
        :root {
            --bg-color: #0a0b10;
            --grid-bg: #121420;
            --accent-blue: #00e5ff;
            --accent-purple: #bd00ff;
            --text-main: #ffffff;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            max-width: 600px;
            max-height: 900px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(45deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats {
            display: flex;
            gap: 1.5rem;
            font-size: 1rem;
        }

        .stat-box {
            background: var(--grid-bg);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .grid-container {
            aspect-ratio: 1;
            width: 100%;
            background: var(--grid-bg);
            border-radius: 16px;
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .cell {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }

        .cell:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.05);
        }

        .cell.selected {
            border-color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
            background: rgba(0, 229, 255, 0.1);
        }

        .cell.matched {
            animation: pulse 0.5s ease-out;
            visibility: hidden;
        }

        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            border-color: var(--text-main);
            color: var(--text-main);
        }

        @keyframes pulse {
            0% { transform: scale(1); background: var(--accent-purple); opacity: 1; }
            100% { transform: scale(1.2); background: transparent; opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <header>
            <div class="title">STAR MATRIX</div>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-label">Score</div>
                    <div id="score">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Moves</div>
                    <div id="moves">0</div>
                </div>
            </div>
        </header>

        <div class="grid-container" id="grid"></div>

        <footer>
            <a href="/arcade" class="nav-btn">← Arcade Lobby</a>
            <button class="nav-btn" onclick="initGame()">Reset System</button>
        </footer>
    </div>

    <script>
        const symbols = ['✦', '▲', '■', '◆', '●', '✖', '▼', '✶'];
        let gridItems = [...symbols, ...symbols];
        let selectedCells = [];
        let score = 0;
        let moves = 0;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initGame() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            selectedCells = [];
            score = 0;
            moves = 0;
            document.getElementById('score').innerText = score;
            document.getElementById('moves').innerText = moves;

            shuffle(gridItems);

            gridItems.forEach((symbol, index) => {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.symbol = symbol;
                cell.dataset.index = index;
                cell.innerText = '•'; // Hidden state format
                cell.addEventListener('click', handleCellClick);
                grid.appendChild(cell);
            });
        }

        function handleCellClick(e) {
            const cell = e.currentTarget;
            
            if (cell.classList.contains('matched') || cell.classList.contains('selected') || selectedCells.length >= 2) {
                return;
            }

            cell.innerText = cell.dataset.symbol;
            cell.classList.add('selected');
            selectedCells.push(cell);

            if (selectedCells.length === 2) {
                moves++;
                document.getElementById('moves').innerText = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            const [cell1, cell2] = selectedCells;

            if (cell1.dataset.symbol === cell2.dataset.symbol) {
                setTimeout(() => {
                    cell1.classList.add('matched');
                    cell2.classList.add('matched');
                    score += 100;
                    document.getElementById('score').innerText = score;
                    selectedCells = [];
                    checkWin();
                }, 400);
            } else {
                setTimeout(() => {
                    cell1.classList.remove('selected');
                    cell2.classList.remove('selected');
                    cell1.innerText = '•';
                    cell2.innerText = '•';
                    selectedCells = [];
                }, 800);
            }
        }

        function checkWin() {
            const matchedCount = document.querySelectorAll('.cell.matched').length;
            if (matchedCount === gridItems.length) {
                setTimeout(() => {
                    alert(`Matrix Aligned Successfully!\nFinal Score: ${score}\nMoves: ${moves}`);
                    initGame();
                }, 500);
            }
        }

        initGame();
    </script>
</body>
</html>
