        /* ── Design tokens ───────────────────────────────── */
        :root {
            --gold:    #ffd700;
            --nebula:  rgba(74, 35, 90, 0.8);
            --bg:      #0f0c1a;
            --surface: #1a1030;
            --border:  #2e1f4a;
            --accent:  #c084fc;
            --ag-text: #e9d5ff;

            --nav-btn: #1e3a8a;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--ag-text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        @media (prefers-reduced-motion: no-preference) {
            body { scroll-behavior: smooth; }
        }

        *:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }

        /* ── Header / Nav ───────────────────────────────── */
        .site-header {
            background: linear-gradient(90deg, #0f0c1a 0%, #1a0d2e 100%);
            color: white;
            padding: 1rem 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            font-weight: 700;
            text-decoration: none;
            color: var(--gold);
        }
        .logo img { height: 36px; width: auto; border-radius: 4px; }

        .main-nav {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            transition: all 0.3s ease;
        }

        .nav-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links a {
            color: var(--ag-text);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        .nav-btn {
            background-color: var(--nav-btn);
            border: 1px solid transparent;
            padding: 0.45rem 1rem;
            border-radius: 6px;
            text-decoration: none;

            transition: background-color 0.2s, color 0.2s;
            font-weight: 600;
            font-size: 0.875rem;
        }
        .nav-btn:hover { background-color: #2563eb; color: white; }
        .nav-btn.active { background-color: var(--accent); color: #0f0c1a; }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.75rem;
            color: white;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .main-nav {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0; right: 0;
                background: #0f0c1a;
                padding: 1rem;
                z-index: 100;
                box-shadow: 0 4px 20px rgba(0,0,0,0.6);
                gap: 0.5rem;
                border-bottom: 1px solid var(--border);
            }
            .main-nav.show { display: flex; }
            .menu-toggle { display: block; }
            .nav-btn { width: 100%; }
        }

        /* ── Main stage ─────────────────────────────────── */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem 4rem;
        }

        .stage-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: var(--gold);

            margin-bottom: 0.5rem;

        .stage-subtitle {
            color: var(--muted);
            font-size: 0.95rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        /* ── Fundraiser Banner Info Panel ───────────────── */
        .fundraiser-banner {
            background: rgba(255, 215, 0, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.25);
            border-radius: 12px;
            padding: 1.25rem;
            max-width: 680px;
            width: 100%;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .fundraiser-progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 999px;
            overflow: hidden;
        }

        .fundraiser-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #b45309, var(--gold));
            width: 18.91%;
            border-radius: 999px;
        }

        /* ── Story card ─────────────────────────────────── */
        .story-card {

            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            max-width: 680px;
            width: 100%;
            box-shadow: 0 0 40px var(--nebula), 0 8px 32px rgba(0,0,0,0.5);
            animation: fadeSlide 0.4s ease;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .chapter-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            background: rgba(192, 132, 252, 0.15);
            border: 1px solid rgba(192, 132, 252, 0.4);
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .story-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--gold);
            margin-bottom: 1rem;
        }

        .story-text {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--ag-text);
            margin-bottom: 1.5rem;
        }

        .story-scripture {
            background: rgba(255,215,0,0.06);
            border-left: 3px solid var(--gold);
            border-radius: 0 8px 8px 0;
            padding: 0.75rem 1rem;
            margin-bottom: 1.5rem;
            font-style: italic;
            color: #d4b483;
            font-size: 0.9rem;
        }
        .story-scripture strong {
            font-style: normal;
            font-weight: 700;
            color: var(--gold);
        }

        /* ── Choices / Campaign Tiers ───────────────────── */
        #choices-container { display: flex; flex-direction: column; gap: 1rem; }

        .campaign-tier-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;

            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .campaign-tier-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            background: rgba(192, 132, 252, 0.02);
        }

        .tier-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tier-title {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: var(--gold);
            font-size: 1.15rem;
        }

        .tier-price {
            font-weight: 700;
            color: var(--accent);
            font-size: 1.1rem;
        }

        .tier-perks-list {
            font-size: 0.85rem;
            color: var(--muted);
            padding-left: 1.25rem;
            list-style-type: disc;
        }

        .choice-btn {
            width: 100%;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            text-align: left;
            border: 2px solid var(--border);
            background: rgba(255,255,255,0.04);
            color: var(--ag-text);
            font-size: 0.95rem;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s, transform 0.15s;
        }
        .choice-btn:hover:not(:disabled) {
            border-color: var(--accent);
            background: rgba(192,132,252,0.1);
            transform: translateX(4px);
        }

        /* ── Puzzle area ─────────────────────────────────── */
        #puzzle-container { display: none; flex-direction: column; align-items: center; gap: 1rem; width: 100%; }
        #puzzle-container.visible { display: flex; }

        .score-bar {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.9rem;
            color: var(--muted);
            width: 100%;
            max-width: 360px;
        }
        .score-bar .score-val { color: var(--gold); font-weight: 700; font-size: 1.1rem; }

        .score-track {
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 999px;
            overflow: hidden;
            min-width: 120px;
        }
        .score-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--gold));
            border-radius: 999px;
            transition: width 0.4s ease;
            width: 0%;
        }

        /* Match board — exactly as spec */
        #match-board {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            width: 360px;
            height: 360px;
            margin: 4px auto;
            padding: 15px;
            background: radial-gradient(ellipse at 50% 30%, rgba(74,35,90,0.6), transparent 70%), var(--bg);
            background-size: cover;
            border: 2px solid var(--gold);
            box-shadow: 0 0 20px var(--nebula);
            border-radius: 12px;
            position: relative;
            touch-action: none;
        }

        @media (max-width: 420px) {
            #match-board { width: 100%; height: auto; }
        }
