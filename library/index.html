<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Library of stories, resources, and biblical content from Amazing Grace Home Living.">
    <meta name="theme-color" content="#020617">
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <link rel="stylesheet" href="../assets/css/unified-nav.css">
    <title>Library | Amazing Grace Home Living</title>

    <style>
        :root {
            --bg: #020617;
            --surface: #0f172a;
            --border: #1e293b;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --neon-blue: #0ea5e9;
            --gold: #facc15;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Inter, Arial, sans-serif;
            background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
            color: var(--text);
            line-height: 1.6;
        }

        .site-header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(2, 6, 23, 0.96);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
        }

        .nav-container {
            max-width: 1120px;
            margin: 0 auto;
            padding: 1rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            color: #fff;
            text-decoration: none;
            font-weight: 700;
        }

        .logo img {
            height: 42px;
            width: auto;
            border-radius: 6px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .nav-links a {
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            padding: 0.5rem 0.8rem;
            border-radius: 999px;
        }

        .nav-links a:hover,
        .nav-links a.nav-active-page {
            background: rgba(56, 189, 248, 0.14);
            color: #fff;
        }

        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 1.5rem 4rem;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 2.75rem);
            margin: 0 0 0.5rem;
            color: #fff;
        }

        .subtitle {
            color: var(--muted);
            margin: 0 0 3rem;
            font-size: 1.1rem;
        }

        .section-heading {
            font-size: 1.5rem;
            margin: 2.5rem 0 1rem;
            color: var(--accent);
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .story-list {
            list-style: none;
            padding: 0;
            margin: 0 0 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.25rem;
        }

        .story-list li {
            margin: 0;
        }

        .story-card {
            display: flex;
            flex-direction: column;
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid var(--border);
            border-radius: 1rem;
            overflow: hidden;
            transition: border-color 0.2s, transform 0.2s;
            text-decoration: none;
            color: var(--text);
        }

        .story-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .story-card-thumb {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            display: block;
            background: #0f172a;
        }

        .story-card-thumb-placeholder {
            width: 100%;
            aspect-ratio: 4/3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            background: rgba(56, 189, 248, 0.06);
        }

        .story-card-body {
            padding: 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .story-card-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--neon-blue);
            margin: 0 0 0.4rem;
        }

        .story-card-meta {
            font-size: 0.82rem;
            color: var(--muted);
            margin: 0 0 0.5rem;
        }

        .story-card-summary {
            font-size: 0.88rem;
            color: var(--muted);
            margin: 0;
            flex: 1;
        }

        .resource-link {
            display: block;
            padding: 1.25rem;
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid var(--border);
            border-radius: 1rem;
            margin: 1rem 0;
            text-decoration: none;
            color: var(--text);
            transition: all 0.2s;
        }

        .resource-link:hover {
            background: rgba(15, 23, 42, 1);
            border-color: var(--accent);
        }

        .resource-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
            margin: 0 0 0.5rem;
        }

        .resource-desc {
            color: var(--muted);
            margin: 0;
        }

        .footer {
            border-top: 1px solid var(--border);
            color: var(--muted);
            text-align: center;
            padding: 1.5rem 1rem 2rem;
        }

        .audio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.25rem;
            margin: 1rem 0 2rem;
        }

        .audio-card {
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.1rem;
        }

        .audio-card h4 {
            margin: 0 0 0.35rem;
            font-size: 1rem;
            color: #fff;
        }

        .audio-card p {
            margin: 0 0 0.75rem;
            font-size: 0.85rem;
            color: var(--muted);
        }

        .audio-card audio {
            width: 100%;
            margin-bottom: 0.5rem;
        }

        .blog-feature {
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid rgba(56, 189, 248, 0.28);
            border-radius: 1rem;
            padding: 1.5rem;
            margin: 0 0 2rem;
        }

        .blog-feature h3 {
            margin: 0 0 0.5rem;
            font-size: 1.3rem;
            color: #fff;
        }

        .blog-feature p {
            color: var(--muted);
            margin: 0 0 1rem;
        }

        .blog-feature a {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
        }

        .blog-feature a:hover { color: #7dd3fc; }

        .media-download {
            display: inline-block;
            font-size: 0.82rem;
            color: var(--accent);
            text-decoration: none;
        }

        .media-download:hover { color: #7dd3fc; }

        @media (max-width: 768px) {
            .nav-container {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="nav-container">
            <a href="../" class="logo" aria-label="Amazing Grace Home Living — Home">
                <img src="../assets/logo.png" alt="Amazing Grace Home Living">
            </a>

            <nav id="main-nav" class="nav-links" aria-label="Main navigation">
                <a href="../#properties">Homes</a>
                <a href="./" class="nav-active-page" aria-current="page">Library</a>
                <a href="../arcade/">Arcade</a>
                <a href="../ministry/">Ministry</a>
                <a href="../contact/">About</a>
            </nav>
        </div>
    </header>

    <main>
        <h1>📚 Library</h1>
        <p class="subtitle">Stories, resources, and faith-based content from Amazing Grace Home Living.</p>

        <div id="story-list" aria-label="Story list">
            <!-- Stories will be loaded dynamically -->
        </div>

        <hr style="border: 0; border-top: 1px solid var(--border); margin: 2rem 0;">

        <a href="https://drive.google.com/file/d/1OVEEA0f9oXdfy62ZBEAKMU75-Ly99o7c/view?usp=drive_link" class="resource-link" target="_blank" rel="noopener noreferrer">Ethiopian Bible</a>
        <br>
        <a href="../audio-library/" class="resource-link">Audio Library</a>

        <br><br>
        <a href="../stories/" class="resource-link">Stories Archive →</a>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Amazing Grace Home Living &mdash; Tampa and Largo, Florida</p>
    </footer>

    <script>
        function esc(str) {
            return String(str || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function resolvePath(entry) {
            var p = entry.path || '';
            // paths like ./slug/ are relative to stories/ — rewrite to ../stories/slug/
            if (p.startsWith('./')) return '../stories/' + p.slice(2);
            // paths like ../news/... are already correct relative to /library/
            if (p.startsWith('../')) return p;
            // fallback: build from slug
            return entry.slug ? '../stories/' + entry.slug + '/' : '#';
        }

        async function loadStories() {
            var list = document.getElementById('story-list');
            var errorDiv = document.createElement('p');
            errorDiv.style.color = '#fecaca';

            try {
                var res = await fetch('../stories/library.json');
                if (!res.ok) throw new Error('HTTP ' + res.status + ' loading library.json');

                var data = await res.json();
                var entries = Array.isArray(data.entries) ? data.entries : [];

                if (!entries.length) {
                    errorDiv.textContent = 'No stories found in the library.';
                    list.appendChild(errorDiv);
                    return;
                }

                entries.forEach(function (entry) {
                    var href = resolvePath(entry);
                    var link = document.createElement('a');
                    link.href = href;
                    link.className = 'resource-link';
                    link.textContent = entry.title || 'Untitled';
                    list.appendChild(link);
                    list.appendChild(document.createElement('br'));
                });
            } catch (err) {
                console.error('Failed to load stories', err);
                errorDiv.textContent = 'Failed to load stories: ' + String(err);
                list.appendChild(errorDiv);
            }
        }

        loadStories();
    </script>
</body>
</html>
