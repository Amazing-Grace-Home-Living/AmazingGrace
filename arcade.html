<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Match Maker — Amazing Grace Home Living</title>
  <link rel="icon" type="image/png" href="./assets/logo.png" />
  <style>
    :root {
      color-scheme: dark;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #e2e8f0;
      background: radial-gradient(circle at top, #1e293b 0%, #020617 60%, #020617 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .page-shell {
      width: min(100%, 820px);
      padding: 1rem;
    }
    .top-bar {
      display: flex;
      justify-content: flex-start;
      margin-bottom: 0.75rem;
    }
    .back-link {
      color: #cbd5e1;
      text-decoration: none;
      font-weight: 600;
    }
    .back-link:hover,
    .back-link:focus-visible {
      color: #f8fafc;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="top-bar">
      <a class="back-link" href="./arcade/">← Back to Arcade</a>
    </div>
    <div id="app"></div>
  </div>
  <script type="module" src="./arcade/main.js"></script>
</body>
</html>
