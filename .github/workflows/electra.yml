name: Electra — Auto Merge Guard

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: write
  contents: read
  checks: read

concurrency:
  group: electra-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  automerge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Guard + attempt auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            const { data: fresh } = await github.rest.pulls.get({ owner, repo, pull_number });

            if (fresh.draft) {
              core.info('⏭️ Skipping: PR is draft');
              return;
            }

            if (fresh.state !== "open" || fresh.merged) {
              core.info('⏭️ Skipping: PR not open or already merged');
              return;
            }

            if (fresh.mergeable !== true) {
              core.info('⏭️ Skipping: PR has merge conflicts');
              return;
            }

            const { data: checks } = await github.rest.checks.listForRef({
              owner,
              repo,
              ref: fresh.head.sha,
              per_page: 100
            });

            const pendingChecks = checks.check_runs.filter(
              check => check.status === 'queued' || check.status === 'in_progress'
            );

            if (pendingChecks.length > 0) {
              core.info(`⏭️ Skipping: ${pendingChecks.length} checks still running`);
              pendingChecks.forEach(check => core.info(`  ⏳ ${check.name}`));
              return;
            }

            const failedChecks = checks.check_runs.filter(
              check => check.status === 'completed' && check.conclusion !== 'success'
            );

            if (failedChecks.length > 0) {
              core.info(`⏭️ Skipping: ${failedChecks.length} checks failed`);
              failedChecks.forEach(check => core.info(`  ❌ ${check.name}`));
              return;
            }

            try {
              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number,
                merge_method: 'squash',
                commit_title: `${fresh.title} (#${pull_number})`,
                commit_message: `Merged by Electra Auto-Merge Guard\n\n${fresh.body || ''}`
              });

              core.info('✅ Auto-merge successful');

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull_number,
                body: '⚡ **Electra**: Auto-merged successfully! All checks passed. 🎉'
              });

            } catch (error) {
              const status = error?.status ?? 0;
              const message = String(error?.message || '');

              if ([403, 405, 409, 422].includes(status) ||
                  /draft|mergeable|conflict|not open|closed/i.test(message)) {
                core.info(`⏭️ Skipping: ${status} ${message}`);
                return;
              }

              throw error;
            }
