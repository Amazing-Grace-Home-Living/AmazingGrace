name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --passWithNoTests

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify critical pages exist
        run: |
          test -f dist/index.html
          test -f dist/arcade/index.html
          test -f dist/stories/index.html
          test -f dist/manifest.json

      - name: Check for placeholder content
        run: |
          # Keep this narrow so normal HTML placeholder attributes do not fail deploy validation.
          matches=$(grep -RIniE --include='*.html' "lorem ipsum|todo|placeholder text" dist || true)
          if [ -n "$matches" ]; then
            printf '%s\n' "$matches"
            echo "Placeholder content found in dist/"
            exit 1
          fi

      - name: Validate internal navigation and asset links
        run: node scripts/validate-dist-links.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
