name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.js'
      - '**/*.jsx'
      - '**/*.json'
      - 'firestore.rules'

concurrency:
  group: gemini-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/run-gemini-cli@v0
        continue-on-error: true
        env:
          GEMINI_CLI_TRUST_WORKSPACE: true
        with:
          gemini_api_key: ${{ secrets.GEMINI }}
          prompt: "Review this PR for security, performance, and Node/React best practices. Focus specifically on Firestore rule compliance and React performance optimization in the Game loop."
