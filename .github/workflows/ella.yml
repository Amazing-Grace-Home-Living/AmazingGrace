name: "Ella — Unified Operations"

on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      task:
        description: "Task to run"
        required: true
        type: choice
        options:
          - sync-key-master
          - audit-suggestions

permissions:
  contents: write
  pull-requests: write

jobs:
  # 1. Ella's Reviewer Engine
  apply-suggestions:
    if: >
      github.event_name == 'pull_request_review' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      !github.event.pull_request.draft &&
      contains(fromJSON('["commented","changes_requested"]'), github.event.review.state) &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git identity
        run: |
          git config user.name "Ella"
          git config user.email "ella[bot]@users.noreply.github.com"

      - name: Analyze review for auto-apply
        id: analyze
        run: node scripts/ella-auto-apply-review.js

      - name: Apply review patch
        id: apply
        if: steps.analyze.outputs.result == 'ready'
        run: node scripts/ella-auto-apply-review.js --apply

      - name: Respond to review
        if: >
          always() &&
          (steps.apply.outputs.result == 'applied' ||
          steps.apply.outputs.result == 'error' ||
          steps.analyze.outputs.reason == 'no_apply_marker')
        uses: actions/github-script@v7
        env:
          ANALYZE_RESULT: ${{ steps.analyze.outputs.result }}
          ANALYZE_REASON: ${{ steps.analyze.outputs.reason }}
          APPLY_RESULT: ${{ steps.apply.outputs.result }}
          CHANGED_FILES: ${{ steps.apply.outputs.changed_files }}
          PUSHED_SHA: ${{ steps.apply.outputs.pushed_sha }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const reviewer = context.payload.review?.user?.login || "reviewer";
            const reviewState = context.payload.review?.state || "commented";
            const analyzeReason = process.env.ANALYZE_REASON || "";
            const applyResult = process.env.APPLY_RESULT || "";
            const changedFiles = process.env.CHANGED_FILES || "[]";
            const pushedSha = process.env.PUSHED_SHA || "";

            let body = "";
            if (applyResult === "applied") {
              body = [
                `✅ Processed ${reviewState} feedback from @${reviewer}.`,
                "",
                `Auto-applied review patch and pushed commit \`${pushedSha}\`.`,
                "",
                `Changed files: \`${changedFiles}\``,
              ].join("\n");
            } else if (applyResult === "error") {
              body = [
                `⚠️ Processed ${reviewState} feedback from @${reviewer}.`,
                "",
                "Attempted auto-apply but patch validation/apply failed.",
                "Please provide a valid `<!-- ella:apply -->` patch block or apply manually in this PR.",
              ].join("\n");
            } else if (analyzeReason === "no_apply_marker") {
              body = [
                `📝 Received ${reviewState} feedback from @${reviewer}.`,
                "",
                "No auto-apply patch marker was found in the review body.",
                "I will handle the requested updates in follow-up commits on this PR.",
              ].join("\n");
            }

            if (body) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
            }
