name: "Ella — Unified Operations"

on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      task:
        description: "Task to run"
        required: true
        type: choice
        options:
          - sync-key-master
          - audit-suggestions

permissions:
  contents: write
  pull-requests: write

jobs:
  # 0. Auto-sync conflicted PR branches when trusted reviewers request it
  sync-conflicted-branch:
    if: >-
      github.event_name == 'pull_request_review' &&
      (github.event.review.state == 'changes_requested' || github.event.review.state == 'commented') &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      !github.event.pull_request.draft &&
      (github.event.review.author_association == 'OWNER' || github.event.review.author_association == 'MEMBER' || github.event.review.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git identity
        run: |
          git config user.name "Ella"
          git config user.email "ella[bot]@users.noreply.github.com"

      - name: Sync branch when review requests conflict resolution
        env:
          REVIEW_BODY: ${{ github.event.review.body }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if ! printf '%s' "$REVIEW_BODY" | grep -Eiq '(resolve|merge|fix|sync) (the )?(merge )?conflicts?|update( the)? branch'; then
            echo "No conflict-resolution request in this review."
            exit 0
          fi

          before_sha="$(git rev-parse HEAD)"
          git fetch origin "$BASE_REF"

          if git merge --no-edit "origin/$BASE_REF"; then
            echo "Merged base branch into PR branch."
          else
            conflicted_files="$(git diff --name-only --diff-filter=U)"
            echo "Merge conflict detected; auto-resolving conflicting files by preferring PR branch changes:"
            printf '%s\n' "$conflicted_files"
            while IFS= read -r file; do
              [ -z "$file" ] && continue
              # Intentional: this runs only after an explicit trusted review request to resolve/sync conflicts.
              git checkout --ours -- "$file"
            done <<< "$conflicted_files"
            git add -A
            conflict_count="$(printf '%s\n' "$conflicted_files" | sed '/^$/d' | wc -l | tr -d ' ')"
            git commit -m "chore: auto-resolve merge conflicts [Ella] (${conflict_count} files)"
          fi

          after_sha="$(git rev-parse HEAD)"
          if [ "$before_sha" = "$after_sha" ]; then
            echo "Branch already up to date; nothing to push."
            exit 0
          fi

          git push origin HEAD:"refs/heads/$HEAD_REF"

  # 1. Ella's Reviewer Engine
  apply-suggestions:
    if: github.event_name == 'pull_request_review' && github.event.review.state == 'commented' && github.event.pull_request.head.repo.full_name == github.repository && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git identity
        run: |
          git config user.name "Ella"
          git config user.email "ella[bot]@users.noreply.github.com"

      - name: Apply trusted review patch recommendations
        run: node scripts/ella-auto-apply-review.js --apply

      - name: Apply Review Suggestions
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const reviewId = context.payload.review.id;

            const comments = await github.paginate(github.rest.pulls.listReviewComments, {
                owner, repo, pull_number: prNumber, per_page: 100
            });

            const suggestions = comments.filter(c => 
                c.pull_request_review_id === reviewId && /```suggestion/.test(c.body)
            );

            if (suggestions.length === 0) return core.info("No suggestions found.");

            let modified = false;
            for (const comment of suggestions) {
                const filePath = comment.path;
                const match = comment.body.match(/```suggestion\r?\n([\s\S]*?)```/);
                if (!match) {
                    core.warning(`Could not extract suggestion from comment ${comment.id} on ${filePath}`);
                    continue;
                }
                const suggestedContent = match[1];
                // comment.line is the end line (1-based), start_line is the start (falls back to line)
                const startLine = (comment.start_line || comment.line) - 1; // convert to 0-based
                const endLine = comment.line - 1; // 0-based

                const fullPath = path.join(process.env.GITHUB_WORKSPACE, filePath);
                if (!fs.existsSync(fullPath)) {
                    core.warning(`File not found: ${fullPath}`);
                    continue;
                }
                const fileLines = fs.readFileSync(fullPath, 'utf8').split('\n');
                const newLines = suggestedContent.split('\n');
                // Remove trailing empty element produced by a trailing newline in suggestedContent
                if (newLines[newLines.length - 1] === '') newLines.pop();
                fileLines.splice(startLine, endLine - startLine + 1, ...newLines);
                fs.writeFileSync(fullPath, fileLines.join('\n'));
                core.info(`Applied suggestion from comment ${comment.id} to ${filePath} (lines ${startLine + 1}–${endLine + 1})`);
                modified = true;
            }

            if (modified) {
                execSync('git add -A');
                execSync('git commit -m "chore: apply review suggestions [Ella]"');
                execSync(`git push origin HEAD:refs/heads/${context.payload.pull_request.head.ref}`);
                core.info("Changes committed and pushed.");
            } else {
                core.info("No suggestions applied.");
            }
