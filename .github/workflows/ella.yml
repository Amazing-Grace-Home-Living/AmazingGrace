permissions:
  contents: write
  pull-requests: write

jobs:
  # 1. Ella's Reviewer Engine
  apply-suggestions:
    if: github.event_name == 'pull_request_review' && github.event.pull_request.head.repo.full_name == github.repository && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git identity
        run: |
          git config user.name "Ella"
          git config user.email "ella[bot]@users.noreply.github.com"

