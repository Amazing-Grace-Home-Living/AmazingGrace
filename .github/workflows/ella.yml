name: "Ella — Unified Operations"

on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      task:
        description: "Task to run"
        required: true
        type: choice
        options:
          - sync-key-master
          - audit-suggestions

permissions:
  contents: write
  pull-requests: write

jobs:
  # 1. Ella's Reviewer Engine
  apply-suggestions:
    if: github.event_name == 'pull_request_review' && github.event.pull_request.head.repo.full_name == github.repository && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git identity
        run: |
          git config user.name "Ella"
          git config user.email "ella[bot]@users.noreply.github.com"

      - name: Apply Review Suggestions
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const reviewId = context.payload.review.id;

            const comments = await github.paginate(github.rest.pulls.listReviewComments, {
                owner, repo, pull_number: prNumber, per_page: 100
            });

            const suggestions = comments.filter(c => 
                c.pull_request_review_id === reviewId && /```suggestion/.test(c.body)
            );

            if (suggestions.length === 0) return core.info("No suggestions found.");

            let modified = false;
            for (const comment of suggestions) {
                const filePath = comment.path;
                const match = comment.body.match(/```suggestion\r?\n([\s\S]*?)```/);
                if (!match) {
                    core.warning(`Could not extract suggestion from comment ${comment.id} on ${filePath}`);
                    continue;
                }
                const suggestedContent = match[1];
                // comment.line is the end line (1-based), start_line is the start (falls back to line)
                const startLine = (comment.start_line || comment.line) - 1; // convert to 0-based
                const endLine = comment.line - 1; // 0-based

                const fullPath = path.join(process.env.GITHUB_WORKSPACE, filePath);
                if (!fs.existsSync(fullPath)) {
                    core.warning(`File not found: ${fullPath}`);
                    continue;
                }
                const fileLines = fs.readFileSync(fullPath, 'utf8').split('\n');
                const newLines = suggestedContent.split('\n');
                // Remove trailing empty element produced by a trailing newline in suggestedContent
                if (newLines[newLines.length - 1] === '') newLines.pop();
                fileLines.splice(startLine, endLine - startLine + 1, ...newLines);
                fs.writeFileSync(fullPath, fileLines.join('\n'));
                core.info(`Applied suggestion from comment ${comment.id} to ${filePath} (lines ${startLine + 1}–${endLine + 1})`);
                modified = true;
            }

            if (modified) {
                execSync('git add -A');
                execSync('git commit -m "chore: apply review suggestions [Ella]"');
                execSync(`git push origin HEAD:refs/heads/${context.payload.pull_request.head.ref}`);
                core.info("Changes committed and pushed.");
            } else {
                core.info("No suggestions applied.");
            }
