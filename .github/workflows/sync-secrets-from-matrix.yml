name: Sync Secrets from Matrix
on:
  repository_dispatch:
    types: [key_rotation_event]

jobs:
  update-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Update GitHub Actions Secret
        uses: appleboy/github-action-github-api-v3@master
        with:
          token: ${{ secrets.keyMaster }}
          method: PUT
          path: /repos/${{ github.repository }}/actions/secrets/${{ github.event.client_payload.secret_id }}
          body: |
            {
              "encrypted_value": "${{ github.event.client_payload.new_value }}",
              "key_id": "${{ github.event.client_payload.key_id }}"
            }
