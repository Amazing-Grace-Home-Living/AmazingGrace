name: Sync Secrets from Matrix

on:
  repository_dispatch:
    types: [key_rotation_event]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Run Key Master Sync
        run: npm run sync-key
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}